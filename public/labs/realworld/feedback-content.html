<!DOCTYPE html>
<html><head><style>body{font-family:sans-serif;padding:20px;background:#fff;color:#374151;font-size:13px}h3{font-size:15px;margin-bottom:16px}label{display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:4px;margin-top:12px}select,textarea,input{width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;font-family:inherit;margin-bottom:4px}textarea{height:80px;resize:vertical}button{background:#4f46e5;color:white;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;margin-top:12px;width:100%}button:hover{background:#4338ca}.success{display:none;text-align:center;padding:30px;color:#059669;font-weight:600}</style></head>
<body>
<div id="form-view">
<h3>Send Feedback</h3>
<label>Category</label>
<select><option>Bug Report</option><option>Feature Request</option><option>General Feedback</option></select>
<label>Your Email</label>
<input type="email" placeholder="you@company.com">
<label>Message</label>
<textarea placeholder="Tell us what you think..."></textarea>
<button onclick="submitFeedback()">Submit Feedback</button>
</div>
<div class="success" id="success-view"><p style="font-size:32px;margin-bottom:8px">✓</p><p>Thank you for your feedback!</p></div>
<script>function submitFeedback(){document.getElementById('form-view').style.display='none';document.getElementById('success-view').style.display='block';}</script>
</body></html>
