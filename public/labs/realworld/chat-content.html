<!DOCTYPE html>
<html><head><style>body{font-family:sans-serif;padding:0;margin:0;background:#fff;color:#374151;font-size:13px;display:flex;flex-direction:column;height:100vh}.header{background:#4f46e5;color:white;padding:12px 16px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}.header .dot{width:8px;height:8px;border-radius:50%;background:#34d399}.msgs{flex:1;padding:16px;overflow-y:auto}.msg{margin-bottom:12px;display:flex;gap:8px}.msg .avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white}.msg .bubble{background:#f3f4f6;border-radius:12px;padding:8px 12px;max-width:240px;font-size:13px;line-height:1.5}.msg.agent .avatar{background:#4f46e5}.msg.user .avatar{background:#6b7280}.msg.agent .bubble{background:#eef2ff}.input-area{padding:12px;border-top:1px solid #e5e7eb;display:flex;gap:8px}input{flex:1;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px}button{background:#4f46e5;color:white;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer}</style></head>
<body>
<div class="header"><div class="dot"></div>Sarah - Online</div>
<div class="msgs">
<div class="msg agent"><div class="avatar">S</div><div class="bubble">Hi! How can I help you today?</div></div>
<div class="msg user"><div class="avatar">Y</div><div class="bubble">I need help with document sharing</div></div>
<div class="msg agent"><div class="avatar">S</div><div class="bubble">Sure! You can share documents by clicking the share icon. Would you like me to walk you through it?</div></div>
</div>
<div class="input-area"><input type="text" placeholder="Type a message..." id="chatInput"><button onclick="sendMsg()">Send</button></div>
<script>
function sendMsg(){var i=document.getElementById('chatInput');if(!i.value)return;var m=document.querySelector('.msgs');m.innerHTML+='<div class="msg user"><div class="avatar">Y</div><div class="bubble">'+i.value+'</div></div>';i.value='';setTimeout(function(){m.innerHTML+='<div class="msg agent"><div class="avatar">S</div><div class="bubble">Thanks for your message! A team member will follow up shortly.</div></div>';m.scrollTop=m.scrollHeight;},800);}
</script>
</body></html>
